type Post {
  id: Int!
  title: String!
  thumbnailUrl: String
  summary: String!
  content: String!
  publishedAt: String!
  createdAt: String!
  updatedAt: String!
}

input CreatePostInput {
  title: String!
  thumbnailUrl: String
  summary: String!
  content: String!
  publishedAt: String!
}

input UpdatePostInput {
  id: Int!
  title: String
  thumbnailUrl: String
  summary: String
  content: String
  publishedAt: String
}

type Query {
  post: [Post]!
  postOne(id: Int!): Post
}

type Mutation {
  createPost(input: CreatePostInput!): Post!
  updatePost(input: UpdatePostInput!): Post!
  removePost(id: Int!): Post
}
